<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raṣāʾif — Analysis & Statistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,600;1,8..60,300&family=Scheherazade+New:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header class="site-header">
  <div class="page-wrap header-inner">
    <a class="site-brand" href="index.html">
      <span class="site-name" id="hd-name">Raṣāʾif</span>
      <span class="site-tagline" id="hd-tag">Arabic–English Parallel Corpus</span>
    </a>
    <nav class="site-nav">
      <a href="index.html"    class="nav-link" id="nav-search">Search</a>
      <a href="analysis.html" class="nav-link active" id="nav-analysis">Analysis</a>
      <a href="about.html"    class="nav-link" id="nav-about">About</a>
      <a href="cite.html"     class="nav-link" id="nav-cite">Cite</a>
      <button class="nav-lang-btn" id="lang-toggle" onclick="toggleLang()">العربية</button>
    </nav>
  </div>
</header>

<div class="analysis-layout">

  <!-- SIDEBAR -->
  <aside class="analysis-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading"><span id="lbl-text">Text</span></div>
      <select class="analysis-select" id="text-select" onchange="runAnalysis()">
        <option value="all" id="opt-all-texts">All texts (combined)</option>
      </select>

      <div class="sidebar-heading"><span id="lbl-lang-sel">Language</span></div>
      <div class="radio-row" style="flex-direction:column;gap:.4rem">
        <label class="radio-pill"><input type="radio" name="anlang" value="en" checked onchange="runAnalysis()"> <span id="opt-lang-en">English</span></label>
        <label class="radio-pill"><input type="radio" name="anlang" value="ar" onchange="runAnalysis()"> <span id="opt-lang-ar">Arabic</span></label>
      </div>
    </div>

    <div style="margin-top:2rem">
      <div class="sidebar-heading"><span id="lbl-ngram-type">Phrases</span></div>
      <div class="radio-row" style="flex-direction:column;gap:.4rem">
        <label class="radio-pill"><input type="radio" name="ngram" value="2" checked onchange="renderNgrams()"> <span id="opt-bigram">Bigrams (2 words)</span></label>
        <label class="radio-pill"><input type="radio" name="ngram" value="3" onchange="renderNgrams()"> <span id="opt-trigram">Trigrams (3 words)</span></label>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="analysis-main">

    <!-- Stats cards -->
    <section class="analysis-section">
      <div class="analysis-section-heading" id="stats-heading">Corpus Statistics</div>
      <div class="stat-grid" id="stat-grid">
        <div class="status-msg"><span class="spinner"></span></div>
      </div>
    </section>

    <!-- Word frequency -->
    <section class="analysis-section">
      <div class="analysis-section-heading" id="freq-heading">Word Frequency</div>
      <div class="analysis-note" id="freq-note">Stopwords removed · Arabic shows approximate stems · English shows lemmas</div>
      <ul class="freq-list" id="freq-list">
        <div class="status-msg"><span class="spinner"></span></div>
      </ul>
      <button class="export-btn" style="margin-top:.75rem" onclick="exportFreq()" id="freq-export-btn">Export CSV</button>
    </section>

    <!-- N-grams -->
    <section class="analysis-section">
      <div class="analysis-section-heading" id="ngram-heading">Frequent Phrases</div>
      <ul class="freq-list" id="ngram-list">
        <div class="status-msg"><span class="spinner"></span></div>
      </ul>
    </section>

    <!-- Collocations -->
    <section class="analysis-section">
      <div class="analysis-section-heading" id="colloc-heading">Collocations</div>
      <div class="analysis-note" id="colloc-note">Ranked by PMI (pointwise mutual information)</div>
      <div class="colloc-grid" id="colloc-grid">
        <div class="status-msg"><span class="spinner"></span></div>
      </div>
    </section>

  </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/engine.js"></script>
<script>
let statsData = null, ngramData = null, bigramData = null, trigramData = null;

function toggleLang() {
  setLang(LANG === 'en' ? 'ar' : 'en');
  applyI18n();
}

function applyI18n() {
  document.getElementById('hd-name').textContent     = t('site_name');
  document.getElementById('hd-tag').textContent      = t('site_subtitle');
  document.getElementById('nav-search').textContent   = t('nav_search');
  document.getElementById('nav-analysis').textContent = t('nav_analysis');
  document.getElementById('nav-about').textContent    = t('nav_about');
  document.getElementById('nav-cite').textContent     = t('nav_cite');
  document.getElementById('lang-toggle').textContent  = t('toggle_lang');
  document.getElementById('lbl-text').textContent     = t('text_selector');
  document.getElementById('lbl-lang-sel').textContent = t('lang_selector');
  document.getElementById('opt-all-texts').textContent= t('all_texts');
  document.getElementById('opt-lang-en').textContent  = 'English';
  document.getElementById('opt-lang-ar').textContent  = LANG==='ar'?'العربية':'Arabic';
  document.getElementById('stats-heading').textContent= t('stats_heading');
  document.getElementById('freq-heading').textContent = t('freq_heading');
  document.getElementById('freq-note').textContent    = t('stopwords_note');
  document.getElementById('ngram-heading').textContent= t('ngram_heading');
  document.getElementById('colloc-heading').textContent= t('colloc_heading');
  document.getElementById('colloc-note').textContent  = t('pmi_note');
  document.getElementById('opt-bigram').textContent   = t('bigrams');
  document.getElementById('opt-trigram').textContent  = t('trigrams');
}

async function populateTextSelect() {
  const cat = await RasaifEngine.loadCatalogue();
  const sel = document.getElementById('text-select');
  for (const category of cat.categories) {
    const og = document.createElement('optgroup');
    og.label = LANG==='ar' ? category.ar : category.en;
    for (const sub of (category.subcategories||[])) {
      for (const txt of (sub.texts||[])) {
        const o = document.createElement('option');
        o.value = txt.id;
        o.textContent = (LANG==='ar'?txt.title_ar:txt.title_en) + ' — ' + (LANG==='ar'?txt.author_ar:txt.author_en);
        og.appendChild(o);
      }
    }
    sel.appendChild(og);
  }
}

async function runAnalysis() {
  const textVal = document.getElementById('text-select').value;
  const lang    = document.querySelector('input[name=anlang]:checked').value;
  const textIds = textVal === 'all' ? null : new Set([textVal]);

  // Stats
  document.getElementById('stat-grid').innerHTML = `<div class="status-msg" style="grid-column:1/-1"><span class="spinner"></span></div>`;
  const stats = await RasaifEngine.computeStats(textIds);
  statsData = stats;
  renderStats(stats, lang);

  // Frequency
  document.getElementById('freq-list').innerHTML = `<div class="status-msg"><span class="spinner"></span></div>`;
  const freq = lang === 'ar' ? stats.freqAr : stats.freqEn;
  renderFreq(freq.slice(0,40), lang);

  // N-grams
  await loadNgrams(lang, textIds);

  // Collocations
  document.getElementById('colloc-grid').innerHTML = `<div class="status-msg"><span class="spinner"></span></div>`;
  const collocs = await RasaifEngine.collocations(lang, 4, 2, textIds);
  renderCollocs(collocs, lang);
}

function renderStats(stats, lang) {
  const grid = document.getElementById('stat-grid');
  const isAr = lang === 'ar';
  const ttr = isAr ? (stats.ttrAr*100).toFixed(1) : (stats.ttrEn*100).toFixed(1);
  const cards = [
    [t('stat_sentences'), stats.sentences.toLocaleString(), ''],
    [t('stat_tokens'),    (isAr?stats.tokAr:stats.tokEn).toLocaleString(), isAr?'Arabic':'English'],
    [t('stat_types'),     (isAr?stats.typeAr:stats.typeEn).toLocaleString(), 'lemma/stem types'],
    [t('stat_ttr'),       ttr+'%', 'type-token ratio'],
  ];
  grid.innerHTML = cards.map(([lbl,num,sub])=>`
    <div class="stat-card">
      <div class="stat-card-label">${lbl}</div>
      <div class="stat-card-num">${num}</div>
      ${sub?`<div class="stat-card-lang">${sub}</div>`:''}
    </div>`).join('');
}

function renderFreq(freq, lang) {
  const isAr = lang === 'ar';
  const max = freq[0]?.[1] || 1;
  document.getElementById('freq-list').innerHTML = freq.map(([word,count],i)=>`
    <li class="freq-item">
      <span class="freq-rank">${i+1}</span>
      <span class="freq-word ${isAr?'arabic-text ar-word':''}">${word}</span>
      <div class="freq-bar-wrap"><div class="freq-bar" style="width:${(count/max*100).toFixed(1)}%"></div></div>
      <span class="freq-count">${count}</span>
    </li>`).join('');
}

async function loadNgrams(lang, textIds) {
  const n = parseInt(document.querySelector('input[name=ngram]:checked').value);
  document.getElementById('ngram-list').innerHTML = `<div class="status-msg"><span class="spinner"></span></div>`;
  const grams = await RasaifEngine.nGrams(n, lang, textIds);
  ngramData = grams;
  const isAr = lang === 'ar';
  const max = grams[0]?.[1] || 1;
  document.getElementById('ngram-list').innerHTML = grams.slice(0,30).map(([gram,count],i)=>`
    <li class="freq-item">
      <span class="freq-rank">${i+1}</span>
      <span class="freq-word ${isAr?'arabic-text ar-word':''}">${gram}</span>
      <div class="freq-bar-wrap"><div class="freq-bar" style="width:${(count/max*100).toFixed(1)}%"></div></div>
      <span class="freq-count">${count}</span>
    </li>`).join('');
}

async function renderNgrams() {
  const lang    = document.querySelector('input[name=anlang]:checked').value;
  const textVal = document.getElementById('text-select').value;
  const textIds = textVal === 'all' ? null : new Set([textVal]);
  await loadNgrams(lang, textIds);
}

function renderCollocs(collocs, lang) {
  const isAr = lang === 'ar';
  document.getElementById('colloc-grid').innerHTML = collocs.map(c=>`
    <div class="colloc-item">
      <span class="colloc-words ${isAr?'arabic-text':''}">${c.w1} · ${c.w2}</span>
      <span class="colloc-pmi">PMI ${c.pmi.toFixed(2)}</span>
    </div>`).join('') || `<div class="status-msg">Not enough data for collocations.</div>`;
}

function exportFreq() {
  if (!statsData) return;
  const lang = document.querySelector('input[name=anlang]:checked').value;
  const freq = lang === 'ar' ? statsData.freqAr : statsData.freqEn;
  const csv = 'Rank,Word/Stem,Frequency\n' +
    freq.map(([w,c],i)=>`${i+1},"${w}",${c}`).join('\n');
  RasaifEngine.downloadCSV(csv, `rasaif-frequency-${lang}.csv`);
}

setLang(LANG);
applyI18n();
populateTextSelect().then(() => runAnalysis());
</script>
</body>
</html>
